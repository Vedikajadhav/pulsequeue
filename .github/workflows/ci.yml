name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pulseuser
          POSTGRES_PASSWORD: pulse123
          POSTGRES_DB: pulsequeue
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run health check test
        env:
          DATABASE_URL: postgresql://pulseuser:pulse123@localhost:5432/pulsequeue
          REDIS_URL: redis://localhost:6379
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          curl -f http://localhost:8001/health

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build